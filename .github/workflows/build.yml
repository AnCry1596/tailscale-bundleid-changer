name: Build & Patch Tailscale IPA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      new_bundle_id:
        description: "New bundle ID"
        required: false
        default: "annnekkk.modified.tailscale"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    env:
      THEOS: ${{ github.workspace }}/theos
      NEW_BUNDLE_ID: ${{ github.event.inputs.new_bundle_id || 'annnekkk.modified.tailscale' }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Install Theos ────────────────────────────────────────────────────────
      - name: Install Theos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "Theos installed at $THEOS"

      # ── Build Bypass.dylib ──────────────────────────────────────────────────
      - name: Build Bypass.dylib
        run: |
          make package FINALPACKAGE=1 2>&1
          DEB=$(ls packages/*.deb | head -1)
          echo "Built deb: $DEB"
          mkdir -p extracted_deb
          DEB_ABS=$(realpath "$DEB")
          (cd extracted_deb && ar x "$DEB_ABS")
          echo "Contents of extracted_deb:"
          ls extracted_deb/
          DATA=$(ls extracted_deb/data.tar.* 2>/dev/null | head -1)
          echo "Data archive: $DATA"
          tar -xf "$DATA" -C extracted_deb 2>/dev/null || true
          echo "Looking for Bypass.dylib..."
          find extracted_deb -type f | sort
          DYLIB=$(find extracted_deb -name "Bypass.dylib" | head -1)
          if [ -z "$DYLIB" ]; then
            echo "ERROR: Bypass.dylib not found after extraction"
            exit 1
          fi
          echo "Found dylib: $DYLIB"
          cp "$DYLIB" Bypass.dylib
          echo "Dylib ready at $(pwd)/Bypass.dylib"

      # ── Install optool ───────────────────────────────────────────────────────
      - name: Install optool
        run: |
          curl -sSL https://github.com/alexzielenski/optool/releases/download/0.1/optool.zip -o optool.zip
          unzip -q optool.zip -d optool_bin
          chmod +x optool_bin/optool
          echo "OPTOOL=$(pwd)/optool_bin/optool" >> $GITHUB_ENV

      # ── Patch iOS 14 IPA ─────────────────────────────────────────────────────
      - name: Patch iOS 14 IPA
        run: |
          IPA=$(ls ipa/ios14/*.ipa | head -1)
          echo "Patching iOS 14: $IPA"
          python3 patch_ipa.py "$IPA" \
            --new-id "$NEW_BUNDLE_ID" \
            --dylib "Bypass.dylib" \
            --inject-tool "$OPTOOL" \
            --keep-plugins \
            --output "Tailscale_iOS14_TrollStore.ipa"

      # ── Patch iOS 15 IPA ─────────────────────────────────────────────────────
      - name: Patch iOS 15 IPA
        run: |
          IPA=$(ls ipa/ios15/*.ipa | head -1)
          echo "Patching iOS 15: $IPA"
          python3 patch_ipa.py "$IPA" \
            --new-id "$NEW_BUNDLE_ID" \
            --dylib "Bypass.dylib" \
            --inject-tool "$OPTOOL" \
            --keep-plugins \
            --output "Tailscale_iOS15_TrollStore.ipa"

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload iOS 14 IPA
        uses: actions/upload-artifact@v4
        with:
          name: Tailscale_iOS14_TrollStore
          path: Tailscale_iOS14_TrollStore.ipa

      - name: Upload iOS 15 IPA
        uses: actions/upload-artifact@v4
        with:
          name: Tailscale_iOS15_TrollStore
          path: Tailscale_iOS15_TrollStore.ipa

      - name: Upload Bypass.dylib
        uses: actions/upload-artifact@v4
        with:
          name: Bypass-dylib
          path: Bypass.dylib

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Get version tags
        id: versions
        run: |
          IOS14_VER=$(ls ipa/ios14/*.ipa | head -1 | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
          IOS15_VER=$(ls ipa/ios15/*.ipa | head -1 | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
          DATE=$(date +%Y%m%d%H%M)
          echo "ios14_ver=$IOS14_VER" >> $GITHUB_OUTPUT
          echo "ios15_ver=$IOS15_VER" >> $GITHUB_OUTPUT
          echo "tag=v${DATE}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versions.outputs.tag }}
          name: "Tailscale TrollStore Patch (${{ steps.versions.outputs.tag }})"
          body: |
            ## Tailscale — TrollStore patched builds

            Bundle ID changed to `${{ env.NEW_BUNDLE_ID }}` so it coexists with the original Tailscale app.

            | File | Version | Target |
            |------|---------|--------|
            | `Tailscale_iOS14_TrollStore.ipa` | ${{ steps.versions.outputs.ios14_ver }} | iOS 14 |
            | `Tailscale_iOS15_TrollStore.ipa` | ${{ steps.versions.outputs.ios15_ver }} | iOS 15 |

            ### Install
            1. Download the IPA for your iOS version
            2. Open with TrollStore on your device
          files: |
            Tailscale_iOS14_TrollStore.ipa
            Tailscale_iOS15_TrollStore.ipa
            Bypass.dylib
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
